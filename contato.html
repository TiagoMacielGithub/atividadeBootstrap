<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html"><i class="bi bi-house"></i></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Contratações Serviços</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contato.html">Contato</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="sobre.html">Sobre nós</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-3">
        <h3>Cadastro</h3>
        <form class="row g-3">
            <!-- Nome do produto -->
            <div class="col-md-7 col-sm-12">
                <div class="form-floating">
                    <input type="text" name="nome" id="nome" class="form-control" placeholder="Nome do produto" required> 
                    <label for="nome">Nome do produto</label>
                </div>
            </div>

            <!-- Valor do produto -->
            <div class="col-md-5 col-sm-12">
                <div class="form-floating">
                    <input type="number" name="valor" id="valor" class="form-control" placeholder="Valor do produto" step="0.5" required> 
                    <label for="valor">Valor do produto</label>
                </div>
            </div>

            <!-- Quantidade -->
            <div class="col-md-5 col-sm-12">
                <div class="form-floating">
                    <input type="number" name="quantidade" id="quantidade" class="form-control" placeholder="quantidade" required> 
                    <label for="quantidade">Quantidade</label>
                </div>
            </div>

            <!-- Select de opções -->
            <div class="col-md-4 col-sm-12">
                <div class="form-floating">
                    <select name="categoria" id="categoria" class="form-select" required>
                        <option value="" selected disabled>Selecione</option>
                        <option value="alimento">Alimento</option>
                        <option value="bebida">Bebida</option>
                        <option value="eletronico">Eletrônico</option>
                        <option value="limpeza">Produto de limpeza</option>
                    </select>
                    <label for="categoria">Categoria</label>
                </div>
            </div>

            <!-- Fabricado -->
            <div class="col-md-4 col-sm-12">
                <label class="form-label d-block">Fabricado</label>
                <div class="form-check form-check">
                    <input type="radio" name="fabricado" id="sp" class="form-check-input">
                    <label for="sp" class="form-check-label">São Paulo</label>
                </div>
                <div class="form-check form-check">
                    <input type="radio" name="fabricado" id="rj" class="form-check-input">
                    <label for="rj" class="form-check-label">Rio de Janeiro</label>
                </div>
                <div class="form-check form-check">
                    <input type="radio" name="fabricado" id="mg" class="form-check-input">
                    <label for="mg" class="form-check-label">Minas Gerais</label>
                </div>
            </div>

            <!-- Botão -->
            <div class="col-12 mb-4">
                <button type="submit" class="btn btn-success">Cadastrar</button>
            </div>
        </form>
    </div>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
